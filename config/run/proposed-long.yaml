# Proposed: TIL-RV (Typed Invariant Ledger + Residual-only Verification) - Long token budget
run_id: proposed-long

method:
  type: proposed
  name: TIL-RV
  description: "Typed Invariant Ledger + Residual-only Verification: constraint satisfaction with typed diversity-constrained invariants and residual-only verification"
  
model:
  name: meta-llama/Llama-3.1-8B-Instruct
  temperature: 0.0
  # [VALIDATOR FIX - Attempt 1]
  # [PROBLEM]: Responses truncated at 320 tokens, preventing FINAL answer extraction
  # [CAUSE]: TIL-RV format requires LEDGER (5 invariants) + SOLVE + VERIFY + optional PATCH + FINAL,
  #          which needs more than 320 tokens to complete. All 10 samples hit exactly 321 tokens.
  # [FIX]: Increased to 400 tokens to allow complete structured reasoning while maintaining length control
  #
  # [OLD CODE]:
  # max_new_tokens: 320
  #
  # [NEW CODE]:
  max_new_tokens: 400
  
dataset:
  name: gsm8k
  split: test
  num_samples: 200
  
inference:
  task_type: math_reasoning
  prompt_strategy: til_rv
  greedy_decoding: true
  typed_invariants:
    enabled: true
    required_types: [BOUND, SIGN_MONOTONE, DISCRETE, CONSERVATION, SANITY]
    enforce_diversity: true
  residual_verification:
    enabled: true
    single_patch_only: true
  
wandb:
  tags: [proposed, til-rv, long-budget, math-reasoning]
